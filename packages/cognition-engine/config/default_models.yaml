# Cognition Engine — Dynamic Model Registry
# ==========================================
# Edit this file to add or remove models. Changes are picked up automatically
# (file watcher reloads the registry without restarting).
#
# To add a custom model, copy the example at the bottom and set `custom: true`
# so it can be removed with REMOVE_CUSTOM_MODEL. Or use: cc models add
#
# Required fields per model: id, provider, display_name, api_base, endpoint,
# auth_header, auth_prefix, capabilities, max_context, max_output, pricing,
# tokenizer, default, tier
#
# Tiers: premium | standard | economy
# Capabilities: chat, tool_use, vision, extended_thinking, streaming, json_mode
#
# --- Ollama local example (commented) ---
# - id: llama3-local
#   provider: ollama
#   display_name: Llama 3 (local)
#   api_base: http://localhost:11434
#   endpoint: /api/chat
#   auth_header: ""
#   auth_prefix: ""
#   capabilities: [chat, streaming]
#   max_context: 8192
#   max_output: 4096
#   pricing: {input_per_1k: 0.0, output_per_1k: 0.0}
#   tokenizer: generic
#   default: false
#   tier: economy
#   custom: true
#
# --- Custom OpenAI-compatible endpoint example (commented) ---
# - id: my-company-gpt
#   provider: openai_compatible
#   display_name: Company GPT
#   api_base: https://llm.mycompany.internal/v1
#   endpoint: /chat/completions
#   auth_header: Authorization
#   auth_prefix: "Bearer "
#   capabilities: [chat, tool_use, streaming]
#   max_context: 128000
#   max_output: 8192
#   pricing: {input_per_1k: 0.002, output_per_1k: 0.006}
#   tokenizer: openai_compatible
#   default: false
#   tier: standard
#   custom: true

