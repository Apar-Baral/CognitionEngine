[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cognition-engine"
version = "0.3.33"
description = "AI development orchestrator providing persistent memory, planning, hallucination prevention, and cost control."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Cognition Engine" }]
dependencies = [
    "typer>=0.12.0",
    "rich>=13.7.0",
    "httpx>=0.27.0",
    "aiohttp>=3.9.0",
    "tiktoken>=0.7.0",
    "networkx>=3.3",
    "pydantic>=2.7.0",
    "pyyaml>=6.0.0",
    "jsonschema>=4.22.0",
    "textual>=0.58.0",
    "plotext>=5.2.8",
]

[project.optional-dependencies]
semantic = [
    "chromadb>=0.5.0",
    "sentence-transformers>=3.0.0",
]
full = [
    "chromadb>=0.5.0",
    "sentence-transformers>=3.0.0",
]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "black>=24.4.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[project.scripts]
cognition-engine = "src.main:main"
ce = "src.main:main"
cc = "src.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src", "src.*"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true
packages = ["src"]
mypy_path = "."

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]
